<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programming Chatbot</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; display: flex; flex-direction: column; align-items: center; padding: 50px;}
        #chatbox { width: 500px; max-width: 90%; background: #fff; border: 1px solid #ccc; padding: 20px; height: 400px; overflow-y: auto; margin-bottom: 20px; border-radius: 10px;}
        .message { margin: 10px 0; }
        .user { color: blue; }
        .bot { color: green; }
        #inputForm { display: flex; width: 500px; max-width: 90%; }
        #message { flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #ccc; }
        #send { padding: 10px 20px; margin-left: 10px; border-radius: 5px; border: none; background: #007BFF; color: #fff; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Programming Chatbot</h1>
    <div id="chatbox"></div>
    <form id="inputForm">
        <input type="text" id="message" placeholder="Ask a programming question..." required>
        <button type="submit" id="send">Send</button>
    </form>

    <script>
        const form = document.getElementById("inputForm");
        const messageInput = document.getElementById("message");
        const chatbox = document.getElementById("chatbox");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const message = messageInput.value.trim();
            if (!message) return;

            // Show user message
            const userMsgDiv = document.createElement("div");
            userMsgDiv.className = "message user";
            userMsgDiv.textContent = "You: " + message;
            chatbox.appendChild(userMsgDiv);

            messageInput.value = "";

            // Call backend
            try {
                const res = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message })
                });
                const data = await res.json();
                const botMsgDiv = document.createElement("div");
                botMsgDiv.className = "message bot";
                botMsgDiv.textContent = "Bot: " + (data.reply || data.error);
                chatbox.appendChild(botMsgDiv);
                chatbox.scrollTop = chatbox.scrollHeight;
            } catch (err) {
                console.error(err);
            }
        });
    </script>
</body>
</html>
